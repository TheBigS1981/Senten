services:
  senten:
    build:
      context: .
      dockerfile: Dockerfile
    # Pre-built image (uncomment and set your registry when using a pre-built image):
    # image: ghcr.io/senten/senten:latest
    ports:
      - "8000:8000"
    volumes:
      # SQLite database and log files (the only writable path in the container)
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      # /tmp is needed by uvicorn/Python at runtime
      - /tmp:noexec,nosuid,mode=1777
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
