<!DOCTYPE html>
<html lang="de" data-theme="light-blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senten — Anmelden</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/fontawesome.min.css">
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
  <style nonce="{{ csp_nonce }}">
    :root {
      --bg: #f9fafb;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --color-interactive-default: #0066ff;
      --color-interactive-subtle: #0066ff18;
    }
    [data-theme="dark-blue"], [data-theme="dark-violet"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
    }
  </style>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="/static/img/logo-large.svg" alt="Senten" height="36">
      </div>
      <h1 class="login-title">Anmelden</h1>
      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="username">Benutzername</label>
          <input type="text" id="username" name="username"
                 autocomplete="username" required autofocus
                 class="form-input">
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <div class="form-input-wrap">
            <input type="password" id="password" name="password"
                   autocomplete="current-password" required
                   class="form-input">
            <button type="button" id="password-toggle" class="password-toggle"
                    aria-label="Passwort anzeigen" title="Passwort anzeigen">
              <i class="fas fa-eye" id="password-toggle-icon" aria-hidden="true"></i>
            </button>
          </div>
        </div>
        <div class="form-group form-group--checkbox">
          <input type="checkbox" id="remember-me" name="remember_me">
          <label for="remember-me" style="margin-bottom:0">Angemeldet bleiben</label>
        </div>
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" class="btn btn-primary login-submit" id="login-btn">
          Anmelden
          <i class="fas fa-arrow-right" aria-hidden="true"></i>
        </button>
      </form>
    </div>
  </div>

  <script nonce="{{ csp_nonce }}">
    // Apply saved theme before paint
    (function() {
      const t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Anmelden…';
      errEl.hidden = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            remember_me: document.getElementById('remember-me').checked,
          }),
        });
        if (res.ok) {
          const params = new URLSearchParams(window.location.search);
          window.location.replace(params.get('next') || '/');
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.detail || 'Login fehlgeschlagen.';
          errEl.hidden = false;
        }
      } catch {
        errEl.textContent = 'Netzwerkfehler. Bitte erneut versuchen.';
        errEl.hidden = false;
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Anmelden <i class="fas fa-arrow-right" aria-hidden="true"></i>';
      }
    });

    // Password visibility toggle
    document.getElementById('password-toggle').addEventListener('click', () => {
      const input = document.getElementById('password');
      const icon  = document.getElementById('password-toggle-icon');
      const btn   = document.getElementById('password-toggle');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
      btn.setAttribute('aria-label', isHidden ? 'Passwort verbergen' : 'Passwort anzeigen');
      btn.setAttribute('title',      isHidden ? 'Passwort verbergen' : 'Passwort anzeigen');
    });
  </script>
</body>
</html>
